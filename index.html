<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Tech | Join Us</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-card">
        <div class="brand">
            <h1>ARISE TECH</h1>
            <p>مجتمع صناع المستقبل</p>
        </div>
        
        <div id="form-content">
            <div class="intro-text">سجل بياناتك وسيتم توجيهك للمسؤول للانضمام فوراً.</div>
            
            <form id="direct-whatsapp-form">
                <div class="input-group">
                    <input type="text" id="userName" placeholder="الاسم الثلاثي" required>

                    <!-- ✅ تم إصلاح مشكلة iPad -->
                    <input type="text" id="userAge" placeholder="العمر"
                           inputmode="numeric" pattern="[0-9]*" required>
                </div>

                <select id="userLevel" required>
                    <option value="">ما هو مستواك في البرمجة؟</option>
                    <option value="مبتدئ جداً">مبتدئ (من الصفر)</option>
                    <option value="أساسيات">مبتدئ (أعرف الأساسيات)</option>
                    <option value="متوسط">متوسط (نفذت مشاريع)</option>
                    <option value="متقدم">متقدم (محترف)</option>
                </select>

                <button type="submit" class="submit-btn">
                    إرسال البيانات والانضمام
                </button>
            </form>
        </div>

        <div class="leadership">
            <span class="section-title">الإدارة المباشرة</span>

            <div class="leaders-grid">
                <a href="https://wa.me/96597805334" class="leader-link leader-jin">
                    <img src="https://raw.githubusercontent.com/SongJinwoo1/Arise-Tech/848a4b7010596b8759551256f4c5e15432e02e6f/IMG_4768.jpeg" class="leader-avatar">
                    <div class="leader-info">
                        <span class="leader-name">سونغ جين وو</span>
                        <span class="leader-role">المؤسس</span>
                    </div>
                </a>

                <a href="https://wa.me/201055719273" class="leader-link leader-ayano">
                    <img src="https://raw.githubusercontent.com/SongJinwoo1/Arise-Tech/848a4b7010596b8759551256f4c5e15432e02e6f/IMG_4767.jpeg" class="leader-avatar">
                    <div class="leader-info">
                        <span class="leader-name">أيانوكوجي</span>
                        <span class="leader-role">المنسق الاستراتيجي</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
