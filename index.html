<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Solutions | The Infinity Showroom</title>
    <link rel="stylesheet" href="root.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="bento.css">
    <link rel="stylesheet" href="logo.css">
    <link rel="stylesheet" href="effects.css">
</head>
<body class="no-transition">
    <div class="liquid-bg"></div>

    <div class="theme-switcher">
        <button id="themeToggle" aria-label="Switch Mode">
            <span class="icon">🌓</span>
        </button>
    </div>

    <header>
        <div class="logo-container" id="mainLogo">
            <svg class="logo-svg" viewBox="0 0 100 40">
                <path class="logo-path" d="M10,20 Q25,5 40,20 T70,20 T100,20" />
                <circle class="logo-dot" cx="85" cy="20" r="3" />
            </svg>
        </div>
        <h1 class="brand-name">Calm Solutions</h1>
        <p id="dynamicGreeting" class="greeting">جاري التحميل...</p>
    </header>

    <main class="bento-container">
        <section class="bento-item large">
            <div class="glow-effect"></div>
            <div class="content-wrapper">
                <span class="badge">Medical Logic</span>
                <h2>الأنظمة الطبية الذكية</h2>
                <p>تحويل التعقيد الطبي إلى سهولة برمجية متناهية.</p>
            </div>
        </section>
        </main>

    <div id="whatsappButton" class="whatsapp-float"></div>

    <script src="main.js"></script>
    <script src="greeting.js"></script>
    <script src="security.js"></script>
    <script src="whatsapp.js"></script>
</body>
</html>
