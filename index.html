<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calm Solutions | The Infinity Showroom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="liquid-bg" id="liquidBg"></div>

    <header>
        <div class="logo-wrapper">
            <svg id="mainLogo" class="logo-svg" viewBox="0 0 100 100">
                <path class="logo-path" d="M10,50 Q40,30 50,50 T90,50" />
                <circle cx="50" cy="50" r="4" class="logo-dot" />
            </svg>
        </div>
        <h1 class="brand-name">Calm Solutions</h1>
        <p id="greeting" class="greeting">الهدوء يبدأ من هنا...</p>
    </header>

    <main class="bento-container">
        <div class="bento-item large" data-category="Medical Logic">
            <div class="glow"></div>
            <div class="item-content">
                <span class="item-category">النظمة الطبية</span>
                <h2 class="item-title">Medical Logic System</h2>
            </div>
        </div>

        <div class="bento-item" data-category="E-commerce">
            <div class="glow"></div>
            <div class="item-content">
                <span class="item-category">متاجر فاخرة</span>
                <h2 class="item-title">Luxury Brand Shop</h2>
            </div>
        </div>

        <div class="bento-item tall" data-category="Custom">
            <div class="glow"></div>
            <div class="item-content">
                <span class="item-category">حلول مخصصة</span>
                <h2 class="item-title">Custom Software</h2>
            </div>
        </div>

        <div class="bento-item" data-category="Performance">
            <div class="glow"></div>
            <div class="item-content">
                <span class="item-category">الأداء</span>
                <h2 class="item-title">120 FPS Engine</h2>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
